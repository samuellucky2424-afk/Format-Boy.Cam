name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v1.0.0, v1.1.0, etc.

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci


      - name: Build app
        working-directory: ./app
        run: npm run electron:build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FLUTTERWAVE_PUBLIC_KEY: ${{ secrets.VITE_FLUTTERWAVE_PUBLIC_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Find built executable
        id: find_exe
        shell: powershell
        run: |
          Write-Host "Listing ./app/release folder:"
          Get-ChildItem -Path "./app/release" -Recurse | Select-Object FullName | Format-List
          $exe = Get-ChildItem -Path "./app/release" -Filter "*.exe" -Recurse | Where-Object { $_.Name -notmatch "blockmap" } | Select-Object -First 1
          if ($exe) {
            $relativePath = "app/release/$($exe.Name)"
            echo "exe_path=$relativePath" >> $env:GITHUB_OUTPUT
            echo "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT
            Write-Host "Found executable: $relativePath"
          } else {
            Write-Host "No executable found in ./app/release"
            Get-ChildItem -Path "./app/release" -Recurse | Format-List
            exit 1
          }

      - name: Calculate SHA256
        id: sha256
        shell: powershell
        run: |
          $hash = (Get-FileHash -Path "${{ steps.find_exe.outputs.exe_path }}" -Algorithm SHA256).Hash
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          Write-Host "SHA256: $hash"

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.find_exe.outputs.exe_path }}
          body: |
            ## Format-Boy Desktop ${{ github.ref_name }}
            
            **SHA256:** `${{ steps.sha256.outputs.hash }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
